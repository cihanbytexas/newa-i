version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: isci_agi_db
    environment:
      POSTGRES_USER: isci_admin
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: isci_agi_production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isci_admin -d isci_agi_production"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: isci_agi_redis
    command: redis-server --requirepass redis_secure_pass_123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
